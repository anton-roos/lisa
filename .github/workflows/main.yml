# .github/workflows/deploy-iis.yml
name: CI/CD - Build → QA → Prod

on:
  push:
    branches:
      - main

jobs:
  # ─── Stage 1: Build & Publish ─────────────────────────────────────────────
  build:
    name: 🔨 Build & Publish
    runs-on: [self-hosted, windows]

    outputs:
      publish-dir: ${{ steps.publish.outputs.publish-dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Restore & Build
        run: |
          dotnet restore
          dotnet build --configuration Release

      - name: Publish
        id: publish
        shell: pwsh
        run: |
          # assign a PS variable
          $out = 'publish'
          # publish into that folder
          dotnet publish --configuration Release --output $out
          # export the path as an output
          Write-Output "::set-output name=publish-dir::$PWD\$out"


  # ─── Stage 2: Deploy to QA ────────────────────────────────────────────────
  deploy-qa:
    name: 🚧 Deploy → QA
    needs: build
    runs-on: [self-hosted, windows]
    # no environment protection here, it fires automatically
    env:
      SITE_PATH: ${{ secrets.IIS_QA_SITE_PATH }}
      APP_POOL:  ${{ secrets.IIS_QA_APP_POOL }}

    steps:
      - name: Deploy to QA IIS
        shell: pwsh
        run: |
          $src  = "${{ needs.build.outputs.publish-dir }}"
          $dest = "${{ env.SITE_PATH }}"
          robocopy $src $dest /MIR /XF appsettings.json /R:3 /W:5
          & "$env:windir\System32\inetsrv\appcmd.exe" list apppool
          & "$env:windir\System32\inetsrv\appcmd.exe" recycle apppool /apppool.name:${{ env.APP_POOL }}


  # ─── Stage 3: Deploy to Prod (manual approval) ────────────────────────────
  deploy-prod:
    name: 🚀 Deploy → Prod
    needs: deploy-qa
    runs-on: [self-hosted, windows]
    environment: production    # ← this ties to GitHub Environment “production”

    env:
      SITE_PATH: ${{ secrets.IIS_PROD_SITE_PATH }}   # e.g. C:\Sites\lisa_prd
      APP_POOL:  ${{ secrets.IIS_PROD_APP_POOL }}    # e.g. dceg-learn.co.za

    steps:
      - name: Deploy to Prod IIS
        shell: pwsh
        run: |
          $src  = "${{ needs.build.outputs.publish-dir }}"
          $dest = "${{ env.SITE_PATH }}"
          robocopy $src $dest /MIR /XF appsettings.json /R:3 /W:5
          & "$env:windir\System32\inetsrv\appcmd.exe" recycle apppool /apppool.name:${{ env.APP_POOL }}
