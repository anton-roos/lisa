name: Deploy to IIS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted  # Use the self-hosted runner

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Restore NuGet Packages
      run: dotnet restore

    - name: Build Application
      run: dotnet build --configuration Release

    - name: Publish Application
      run: dotnet publish --configuration Release --output "C:\actions-runner\temp"

    - name: Deploy to IIS
      run: |
        Copy-Item -Path "C:\actions-runner\temp*" -Destination "C:\Users\Remote\Sites\lis" -Recurse -Force
        Restart-WebAppPool -Name "lis"
    
    - name: Clean Temp Folder
      run: |
        Remove-Item -Path "C:\actions-runner\temp\*" -Recurse -Force
