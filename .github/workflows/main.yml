name: Deploy to IIS with PowerShell

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: setup-msbuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Restore NuGet Packages
      run: |
        dotnet restore

    - name: Build Application
      run: |
        msbuild Lisa.sln /p:Configuration=Release /p:OutputPath=C:\build\output

    - name: Configure WinRM TrustedHosts
      run: |
        Set-Item wsman:\localhost\Client\TrustedHosts -Value "${{ secrets.SERVER_IP }}" -Force

    - name: Deploy with PowerShell
      run: |
        $password = ConvertTo-SecureString -String ${{ secrets.PASSWORD }} -AsPlainText -Force
        $cred = New-Object System.Management.Automation.PSCredential (${{ secrets.USERNAME }}, $password)
    
        # Create a session option to bypass SSL certificate validation
        $sessionOption = New-PSSessionOption -SkipCACheck -SkipCNCheck
    
        # Create the session with the custom session option
        $session = New-PSSession -ComputerName "${{ secrets.SERVER_IP }}" -Credential $cred -UseSSL -SessionOption $sessionOption
    
        # Invoke command on the remote server using the session
        Invoke-Command -Session $session -ScriptBlock {
          try {
            Copy-Item -Path "C:\build\output" -Destination "C:\Users\Remote\Sites\lis" -Recurse -Force
          } catch {
            Write-Error "Failed to copy files: $_"
            exit 1
          }
          Import-Module WebAdministration
          Restart-WebAppPool -Name "lis"
        }
    
        # Clean up the session
        Remove-PSSession -Session $session


