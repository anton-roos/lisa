name: Deploy to IIS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted  # Use self-hosted runner

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Restore NuGet Packages
      run: dotnet restore

    - name: Build Application
      run: dotnet build --configuration Release

    - name: IIS Application Pool Stop
      uses: 1k-off/iis-apppool-action@1.0.0
      with:
        action: stop
        appPoolName: lis
        siteName: lis

    - name: Publish Application
      run: dotnet publish --configuration Release --output "C:\actions-runner\temp"

    - name: Deploy to IIS
      run: |
        try {
          # Deploy the application to IIS
          Copy-Item -Path "C:\actions-runner\temp\*" -Destination "C:\Sites\lis" -Recurse -Force -Exclude "appsettings.json", "web.config"
        } catch {
          # Handle the error (e.g., logging, sending notifications, etc.)
          Write-Host "Error during deployment: $_"
          throw $_  # Rethrow the error to ensure the step fails
        } finally {
          # Clean up the temp folder regardless of success or failure
          Write-Host "Cleaning up the temp folder..."
          Remove-Item -Path "C:\actions-runner\temp\*" -Recurse -Force
        }

    - name: Clean Temp Folder
      run: |
        # This is just an additional safety measure in case of failures
        Remove-Item -Path "C:\actions-runner\temp\*" -Recurse -Force

    - name: IIS Application Pool Start
      uses: 1k-off/iis-apppool-action@1.0.0
      with:
        action: start
        appPoolName: lis 
        siteName: lis
