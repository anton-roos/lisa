services:
  app:
    image: ghcr.io/anton-roos/lisa:latest
    container_name: lisa-app
    restart: always
    ports:
      - "8080:80"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lisa-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthz" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5s
    volumes:
      - data-protection-keys:/root/.aspnet/DataProtection-Keys

  db:
    image: postgres:15
    container_name: lisa-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lisauser
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: lisadb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lisa-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "lisauser"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
  data-protection-keys:

networks:
  lisa-network:
    driver: bridge
